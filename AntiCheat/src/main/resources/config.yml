# 自动处罚命令（%player% 替换为玩家名）
punish-command: "kick %player% §c[AntiCheat] 检测到异常行为"

# 传统规则检测
movement:
  fly: true
  boat-speed: true
  max-boat-speed: 12.0
  water-walk: true

# AI 推理设置
ai:
  enabled: true
  model-path: "scaffold_detector.onnx"
  auto-punish-threshold: 0.85
  alert-threshold: 0.5
  analysis-seconds: 30