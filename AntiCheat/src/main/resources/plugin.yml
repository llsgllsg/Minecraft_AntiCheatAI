name: AntiCheat
version: 1.0
main: com.gfish.anticheat.AntiCheatPlugin
api-version: '1.21'
author: Gfish
description: AI-powered anti-cheat with basic movement checks
commands:
  anticheat:
    description: AntiCheat admin commands
    aliases: [ac]
    permission: anticheat.admin
permissions:
  anticheat.admin:
    default: op

# 让 Paper 自动下载 ONNX Runtime（包含原生库）
libraries:
  - "com.microsoft.onnxruntime:onnxruntime:1.17.1"